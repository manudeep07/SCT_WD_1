<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: rgba(34, 40, 49, 0.95);
      transition: background-color 0.3s ease;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    nav.scrolled {
      background-color: rgba(0, 173, 181, 0.95);
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    .logo {
      color: #ffffff;
      font-size: 26px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .logo:hover {
      color: #00adb5;
      transform: scale(1.05);
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-links li a {
      color: #eeeeee;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 5px;
      transition: all 0.3s ease;
    }

    .nav-links li a:hover {
      background-color: #00adb5;
      color: #ffffff;
      transform: scale(1.05);
    }

    .hamburger {
      display: none;
      font-size: 28px;
      color: #ffffff;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .hamburger:hover {
      transform: scale(1.2);
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      margin-top: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      background-image: url('lauren-mancke-aOC7TSLb1o8-unsplash.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }

    .hero-content {
      background: rgba(0, 0, 0, 0.6);
      padding: 40px;
      border-radius: 10px;
      transform: scale(1.1);
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 30px;
    }

    .cta-button {
      display: inline-block;
      padding: 14px 28px;
      background-color: #00bcd4;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 500;
      transition: background-color 0.3s ease, transform 0.3s ease;
    }

    .cta-button:hover {
      background-color: #008caa;
      transform: scale(1.1);
    }

    footer {
      background-color: #222831;
      color: #eeeeee;
      padding: 20px;
      text-align: center;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-content p {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .footer-links {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0;
    }

    .footer-links li a {
      color: #00bcd4;
      text-decoration: none;
      font-size: 14px;
    }

    .footer-links li a:hover {
      text-decoration: underline;
    }

    /* Responsive Styles */
    @media (max-width: 768px) {
      .hamburger {
        display: block;
      }

      .nav-links {
        display: none;
        flex-direction: column;
        width: 100%;
        background-color: rgba(34, 40, 49, 0.95);
        position: absolute;
        top: 60px;
        left: 0;
        padding: 10px 0;
        z-index: 999;
      }

      .nav-links.show {
        display: flex;
      }

      .nav-links li {
        text-align: center;
      }

      .hero h1 {
        font-size: 36px;
      }

      .hero p {
        font-size: 18px;
      }

      .cta-button {
        font-size: 16px;
        padding: 12px 24px;
      }

      .footer-content p {
        font-size: 14px;
      }

      .footer-links {
        flex-direction: column;
        gap: 10px;
      }

      .footer-links li a {
        font-size: 13px;
      }
    }

    @media (max-width: 576px) {
      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        font-size: 16px;
      }

      .hero-content {
        padding: 20px;
        transform: none;
      }

      .cta-button {
        font-size: 14px;
        padding: 10px 20px;
      }

      .logo {
        font-size: 22px;
      }

      .nav-container {
        flex-direction: column;
        align-items: flex-start;
        padding: 10px 15px;
      }

      .nav-links {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav id="main-nav">
    <div class="nav-container">
      <a href="index.html" class="logo">My Portfolio</a>
      <div class="hamburger" id="hamburger">&#9776;</div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h1>Welcome to My Portfolio</h1>
      <p>Showcasing my skills and projects in technology and design.</p>
      <a href="projects.html" class="cta-button">View My Work</a>
    </div>
  </section>

  <footer>
    <div class="footer-content">
      <p>© 2025 My Portfolio. All rights reserved.</p>
      <ul class="footer-links">
        <li><a href="privacy.html">Privacy Policy</a></li>
        <li><a href="terms.html">Terms of Service</a></li>
        <li><a href="contact.html">Contact Me</a></li>
      </ul>
    </div>
  </footer>

  <script>
    // Scroll effect
    window.addEventListener('scroll', function () {
      const nav = document.getElementById('main-nav');
      if (window.scrollY > 50) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    });

    // Hamburger menu toggle
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');

    hamburger.addEventListener('click', function () {
      navLinks.classList.toggle('show');
    });
  </script>
</body>
</html>
